services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: nutrition
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d nutrition"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://user:pass@db:5432/nutrition
      CORS_ORIGINS: "*"
      # Migrations run via entrypoint.sh; keep this false to avoid double-run
      RUN_MIGRATIONS_ON_STARTUP: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
